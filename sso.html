<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Signing you in — HAF PLNA</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f1eb;font-family:Inter,system-ui,sans-serif;color:#2f373e}
.box{text-align:center}
.spin{width:34px;height:34px;border:3px solid #e5e0d6;border-top-color:#f18e00;border-radius:50%;margin:0 auto 14px;animation:r .8s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
p{font-size:.95rem;font-weight:500}
</style>
</head>
<body>
<div class="box"><div class="spin"></div><p id="msg">Signing you in…</p></div>
<script>
const SUPA_URL='https://ggkpqqrtxtlafdkxcaqg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdna3BxcXJ0eHRsYWZka3hjYXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTM2NjAsImV4cCI6MjA5Nzc2OTY2MH0.hB70KOYZu4dshwhsrxF_dFyBn0n72gStWTwxYGsLdgY';
(async function(){
  const q=new URLSearchParams(location.hash.slice(1));
  const u=(q.get('u')||'').toUpperCase(), k=q.get('k')||'', t=q.get('t')||'w';
  history.replaceState(null,'',location.pathname); /* keep the token out of history */
  if(!u||!k){location.replace('login.html');return}
  try{
    const col=t==='p'?'pin_hash':'password_hash';
    const r=await fetch(SUPA_URL+'/rest/v1/plna_drivers?haf_username=eq.'+encodeURIComponent(u)+'&'+col+'=eq.'+encodeURIComponent(k)+'&select=*',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    const d=await r.json();
    if(!Array.isArray(d)||!d.length){location.replace('login.html');return}
    localStorage.setItem('plna-user',d[0].haf_username);
    localStorage.setItem('plna-profile',JSON.stringify(d[0]));
    localStorage.setItem('plna-auth','1');
    location.replace('dashboard.html');
  }catch(e){document.getElementById('msg').textContent='Connection problem — taking you to the sign-in page…';setTimeout(function(){location.replace('login.html')},1500)}
})();
</script>
</body>
</html>
