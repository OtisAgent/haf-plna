name: Fix booking link clean URL
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Apply fix
        run: |
          python3 << 'PYEOF'
          with open('dashboard.html', 'r') as f:
              c = f.read()
          old = "location.origin+location.pathname.replace('dashboard.html','')+'book.html?driver='+_user"
          new = "location.origin+'/book?driver='+_user"
          c = c.replace(old, new)
          c = c.replace('book.html?driver=${_user}', '${location.origin}/book?driver=${_user}')
          with open('dashboard.html', 'w') as f:
              f.write(c)
          PYEOF
      - name: Commit and push
        run: |
          git config user.email "otis@usehaf.co.uk"
          git config user.name "Otis HAF"
          git add dashboard.html
          git diff --cached --quiet || git commit -m "Fix booking link — use clean /book?driver= URL"
          git push
