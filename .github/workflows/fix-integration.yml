name: Wire booking integration to driver login
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Apply integration changes
        run: |
          echo "" | base64 -d | gunzip > /tmp/patch.py
          python3 /tmp/patch.py
      - name: Commit and push
        run: |
          git config user.email "otis@usehaf.co.uk"
          git config user.name "Otis HAF"
          git add login.html dashboard.html book.html
          git diff --cached --quiet || git commit -m "Wire booking integration — real Supabase auth on login, live driver data on booking page"
          git push
