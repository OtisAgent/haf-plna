        <button class="nav-btn" onclick="switchTab('calendar',this)">

          Notes
        </button>
      </div>

      <div class="nav-section">

        <button class="nav-btn" onclick="switchTab('pod',this)">

        <button class="nav-btn" onclick="switchTab('reports',this)">

          Reports &amp; Analytics

      </div>

      <div class="nav-section">
        <div class="nav-group-label">Pro</div>
        <button class="nav-btn" onclick="switchTab('ai',this)">
          <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/></svg>

          My Rewards
        </button>
        <button class="nav-btn" onclick="switchTab('pass',this)">

          Compliance &amp; Profile

        <button class="nav-btn" onclick="switchTab('comms',this)">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Communications
        </button>
        <button class="nav-btn" onclick="switchTab('billing',this)">
          <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Plans &amp; Billing
        </button>
      </div>
    </div>

    <div class="sidebar-foot">
      <div class="avail-row">
        <span class="avail-label">Available</span>

      </div>
      <button class="theme-btn" onclick="document.body.classList.toggle('dark')" title="Toggle dark mode">
        <svg class="ico-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="ico-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── WORKSPACE ─────────────────────────────────────────── -->
  <div class="workspace">
    <div class="topbar">
      <div class="topbar-left">
        <button class="nav-toggle" id="navToggle" onclick="openSidebar()">
          <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span>HAF PLNA</span>
        <span class="topbar-sep">/</span>
        <span class="crumb-active" id="topbar-crumb">Today</span>
      </div>
      <div class="topbar-right">
        <span class="status-chip orange-chip"><span class="dot"></span>PLNA Pro</span>
        <span class="status-chip"><span class="dot"></span>HAF X v2.1.0</span>
      </div>
    </div>

    <div class="canvas">
      <div class="canvas-inner" id="content">

        <div id="tab-today"></div>
        <div id="tab-calendar" style="display:none"></div>
        <div id="tab-routes" style="display:none"></div>
        <div id="tab-diary" style="display:none"></div>
        <div id="tab-planned" style="display:none"></div>
        <div id="tab-return" style="display:none"></div>
        <div id="tab-empty" style="display:none"></div>
        <div id="tab-notes" style="display:none"></div>
        <div id="tab-pod" style="display:none"></div>
        <div id="tab-money" style="display:none"></div>
        <div id="tab-reports" style="display:none"></div>
        <div id="tab-ai" style="display:none"></div>
        <div id="tab-landing" style="display:none"></div>
        <div id="tab-rewards" style="display:none"></div>
        <div id="tab-pass" style="display:none"></div>
        <div id="tab-compliance" style="display:none"></div>
        <div id="tab-comms" style="display:none"></div>
        <div id="tab-billing" style="display:none"></div>
      </div>
    </div>
  </div>
</div>
<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bottom-nav-btn active" onclick="switchTab('today',this)" id="bnav-today">
      <svg viewBox="0 0 24 24"><path d="M3 8h18M3 8v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8M3 8V6a1 1 0 0 1 1-1h3m10 0h3a1 1 0 0 1 1 1v2M8 5V3m8 2V3"/></svg>
      Today
    </button>
    <button class="bottom-nav-btn" onclick="switchTab('calendar',this)" id="bnav-calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
    </button>
    <button class="bottom-nav-btn" onclick="switchTab('money',this)" id="bnav-money">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Money
    </button>
    <button class="bottom-nav-btn" onclick="switchTab('reports',this)" id="bnav-reports">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </button>
    <button class="bottom-nav-btn" onclick="switchTab('compliance',this)" id="bnav-compliance">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Compliance
    </button>
  </div>
</nav>

<script src="tabs-a.js"></script>
<script src="tabs-b.js"></script>
<script src="tabs-b2.js"></script>
<script src="tabs-c.js"></script>
<script src="tabs-d.js"></script>
<script>
var TABS=['today','calendar','routes','diary','planned','return','empty','notes','pod','money','reports','ai','landing','rewards','pass','compliance','comms','billing'];
var CRUMBS={today:'Today',calendar:'Calendar',routes:'Route Planner',diary:'Driver Diary',planned:'Planned Jobs',return:'Return-Route',empty:'Empty Days',notes:'Notes',pod:'Proof of Delivery',money:'Money & Payouts',reports:'Reports & Analytics',ai:'JUDD AI',landing:'Driver Landing Page',rewards:'My Rewards',pass:'Network Pass',compliance:'Compliance & Profile',comms:'Communications',billing:'Plans & Billing'};
function switchTab(key){TABS.forEach(function(t){var el=document.getElementById('tab-'+t);if(el)el.style.display=t===key?'':'none';});document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});document.querySelectorAll('.bottom-nav-btn').forEach(function(b){b.classList.remove('active');});var clicked=event&&event.currentTarget;if(clicked){if(clicked.classList.contains('nav-btn'))clicked.classList.add('active');else if(clicked.classList.contains('bottom-nav-btn'))clicked.classList.add('active');}var crumb=document.getElementById('topbar-crumb');if(crumb)crumb.textContent=CRUMBS[key]||key;closeSidebar();}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('navScrim').classList.add('show');document.body.classList.add('nav-open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('navScrim').classList.remove('show');document.body.classList.remove('nav-open');}
function toggleAvail(){var t=document.getElementById('availToggle');t.classList.toggle('on');}
</script>
</body>
</html>
